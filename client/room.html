<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WatchParty — Room</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div id="loadingScreen" class="loading-screen">
    <div class="spinner"></div>
    <p>Joining room...</p>
  </div>

  <div id="errorScreen" class="error-screen hidden">
    <h2>❌ Error</h2>
    <p id="errorDetail"></p>
    <a href="/" class="btn-primary">Back to Lobby</a>
  </div>

  <div id="usernameModal" class="modal-overlay hidden">
    <div class="modal">
      <h2>What's your name?</h2>
      <p>Others in the room will see this.</p>
      <input type="text" id="usernameInput" placeholder="e.g. Rahul"
             maxlength="24" autocomplete="off" />
      <button id="usernameSubmit" class="btn-primary">Join Room</button>
    </div>
  </div>

  <div id="watchRoom" class="watch-room hidden">
    <header class="room-header">
      <a href="/" class="back-link">← Lobby</a>
      <div class="room-info">
        <span class="room-id-label">Room:</span>
        <span id="roomIdDisplay" class="room-id-value"></span>
        <button id="copyLinkBtn" class="btn-copy">📋 Copy Link</button>
      </div>
      <div id="connectionStatus" class="connection-status">
        <span class="status-dot disconnected"></span>
        <span class="status-text">Connecting...</span>
      </div>
    </header>

    <main class="room-main">
      <div class="player-wrapper">

        <!-- LOCAL VIDEO — shown for mode=local -->
        <video id="videoPlayer" controls preload="metadata"
               class="hidden"></video>

        <!-- YOUTUBE PLAYER — shown for mode=youtube -->
        <!-- YouTube API replaces this div with an iframe -->
        <div id="youtubePlayer" class="yt-container hidden"></div>

        <!-- YouTube controls overlay -->
        <!-- We need custom play/pause buttons because YouTube's native controls
             don't fire our sync events reliably on all browsers -->
        <div id="ytControls" class="yt-controls hidden">
          <button id="ytPlayPause" class="yt-btn-playpause">▶</button>
          <div class="yt-time">
            <span id="ytCurrentTime">0:00</span>
            <span class="yt-time-sep">/</span>
            <span id="ytDuration">0:00</span>
          </div>
          <input type="range" id="ytSeekBar" class="yt-seekbar"
                 min="0" max="100" value="0" step="0.1" />
          <div class="yt-mode-badge">YouTube</div>
        </div>

        <div id="syncOverlay" class="sync-overlay hidden">
          <div class="sync-message" id="syncMessage"></div>
        </div>
      </div>

      <aside class="sidebar">

        <div class="sidebar-section call-section">
          <h3>Video Call</h3>
          <div id="localVideoWrapper" class="local-video-wrapper hidden">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="local-video-label">You</div>
          </div>
          <div id="remoteVideos" class="remote-videos"></div>
          <div class="call-controls">
            <button id="joinCallBtn" class="btn-call-join">📹 Join Call</button>
            <div id="inCallControls" class="in-call-controls hidden">
              <button id="muteBtn"     class="btn-control">🎤</button>
              <button id="cameraBtn"   class="btn-control">📷</button>
              <button id="leaveCallBtn" class="btn-control btn-danger">📵</button>
            </div>
          </div>
          <div id="callError" class="call-error hidden"></div>
        </div>

        <div class="sidebar-section">
          <h3>Members <span id="memberCount" class="member-count">0</span></h3>
          <div id="memberList" class="member-list"></div>
        </div>

        <div class="sidebar-section chat-section">
          <h3>Chat</h3>
          <div id="chatMessages" class="chat-messages"></div>
          <div class="chat-input-row">
            <input type="text" id="chatInput"
                   placeholder="Type a message..." maxlength="500" />
            <button id="chatSendBtn" class="btn-send">Send</button>
          </div>
        </div>

      </aside>
    </main>
  </div>

  <script src="/js/videoPlayer.js"></script>
  <script src="/js/youtubePlayer.js"></script>
  <script src="/js/syncClient.js"></script>
  <script src="/js/rtcClient.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const roomId = params.get('roomId');
    if (!roomId) { showFatalError('No room ID in URL.'); }
    else { checkRoomAndPromptUsername(roomId); }

    let player     = null;
    let syncClient = null;
    let rtcClient  = null;
    let roomData   = null;

    async function checkRoomAndPromptUsername(roomId) {
      try {
        const res  = await fetch(`/api/rooms/${roomId}`);
        const room = await res.json();
        if (!res.ok) return showFatalError(room.error || 'Room not found.');

        roomData = room;
        document.getElementById('roomIdDisplay').textContent = room.id;
        document.title = `WatchParty — ${room.videoId || room.videoFilename}`;

        document.getElementById('loadingScreen').classList.add('hidden');
        document.getElementById('usernameModal').classList.remove('hidden');
        setTimeout(() => document.getElementById('usernameInput').focus(), 50);

        const submit = () => {
          const username = document.getElementById('usernameInput').value.trim();
          if (!username) return;
          document.getElementById('usernameModal').classList.add('hidden');
          startRoom(room, username);
        };

        document.getElementById('usernameSubmit').addEventListener('click', submit);
        document.getElementById('usernameInput').addEventListener('keydown',
          e => e.key === 'Enter' && submit());

      } catch { showFatalError('Failed to reach server.'); }
    }

    async function startRoom(room, username) {
      document.getElementById('watchRoom').classList.remove('hidden');

      // ── Initialize the correct player based on room mode ───────────────────
      if (room.mode === 'youtube') {
        await initYouTubeMode(room);
      } else {
        initLocalMode(room);
      }

      // ── Sync client — same for both modes ──────────────────────────────────
      syncClient = new SyncClient(player, room.id);
      syncClient.attachToPlayer();

      syncClient.onSyncEvent = (type, time, fromUsername) => {
        const overlay = document.getElementById('syncOverlay');
        const msgEl   = document.getElementById('syncMessage');
        const icons   = { play: '▶️', pause: '⏸️', seek: '⏩' };
        msgEl.textContent = `${icons[type] || ''} ${fromUsername} ${type}d`;
        overlay.classList.remove('hidden');
        setTimeout(() => overlay.classList.add('hidden'), 1200);
      };

      syncClient.onConnected = (state) => {
        setConnectionStatus(true);
        if (state.isHost) appendSystemMsg('You are the host.');
      };

      syncClient.onDisconnected = () => {
        setConnectionStatus(false);
        appendSystemMsg('Disconnected. Reconnecting...');
      };

      syncClient.onMemberUpdate = (members, count) => {
        document.getElementById('memberCount').textContent = count;
        document.getElementById('memberList').innerHTML = members.map(m => `
          <div class="member-row">
            <span class="member-avatar">${m.username[0].toUpperCase()}</span>
            <span class="member-name">${escapeHtml(m.username)}</span>
            ${m.isHost ? '<span class="host-badge">HOST</span>' : ''}
          </div>
        `).join('');
      };

      syncClient.onChat = appendChatMessage;

      // ── WebRTC — same for both modes ───────────────────────────────────────
      rtcClient = new RTCClient(syncClient);

      rtcClient.onLocalStream = (stream) => {
        document.getElementById('localVideo').srcObject = stream;
        document.getElementById('localVideoWrapper').classList.remove('hidden');
        document.getElementById('joinCallBtn').classList.add('hidden');
        document.getElementById('inCallControls').classList.remove('hidden');
      };

      rtcClient.onRemoteStream = (peerId, stream, peerUsername) => {
        removeRemoteVideo(peerId);
        const tile  = document.createElement('div');
        tile.className     = 'remote-video-tile';
        tile.dataset.peerId = peerId;
        const vid   = document.createElement('video');
        vid.autoplay    = true;
        vid.playsinline = true;
        vid.srcObject   = stream;
        const lbl   = document.createElement('div');
        lbl.className   = 'remote-video-label';
        lbl.textContent = peerUsername;
        tile.appendChild(vid);
        tile.appendChild(lbl);
        document.getElementById('remoteVideos').appendChild(tile);
      };

      rtcClient.onPeerLeft  = removeRemoteVideo;
      rtcClient.onError     = (msg) => {
        const el = document.getElementById('callError');
        el.textContent = msg;
        el.classList.remove('hidden');
        setTimeout(() => el.classList.add('hidden'), 6000);
      };

      document.getElementById('joinCallBtn').addEventListener('click', async () => {
        document.getElementById('joinCallBtn').textContent = '⏳ Connecting...';
        document.getElementById('joinCallBtn').disabled = true;
        const ok = await rtcClient.joinCall();
        if (!ok) {
          document.getElementById('joinCallBtn').textContent = '📹 Join Call';
          document.getElementById('joinCallBtn').disabled = false;
        }
      });

      document.getElementById('leaveCallBtn').addEventListener('click', () => {
        rtcClient.leaveCall();
        document.getElementById('localVideo').srcObject = null;
        document.getElementById('localVideoWrapper').classList.add('hidden');
        document.getElementById('inCallControls').classList.add('hidden');
        document.getElementById('joinCallBtn').classList.remove('hidden');
        document.getElementById('joinCallBtn').textContent = '📹 Join Call';
        document.getElementById('joinCallBtn').disabled = false;
        document.getElementById('remoteVideos').innerHTML = '';
      });

      document.getElementById('muteBtn').addEventListener('click', () => {
        const muted = rtcClient.toggleMute();
        document.getElementById('muteBtn').textContent = muted ? '🔇' : '🎤';
      });

      document.getElementById('cameraBtn').addEventListener('click', () => {
        const off = rtcClient.toggleCamera();
        document.getElementById('cameraBtn').textContent = off ? '🚫' : '📷';
      });

      // ── Chat ───────────────────────────────────────────────────────────────
      const sendChat = () => {
        const input = document.getElementById('chatInput');
        const text  = input.value.trim();
        if (text) { syncClient.sendChat(text); input.value = ''; }
      };
      document.getElementById('chatSendBtn').addEventListener('click', sendChat);
      document.getElementById('chatInput').addEventListener('keydown',
        e => e.key === 'Enter' && sendChat());

      document.getElementById('copyLinkBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(window.location.href).then(() => {
          const btn = document.getElementById('copyLinkBtn');
          btn.textContent = '✅ Copied!';
          setTimeout(() => btn.textContent = '📋 Copy Link', 2000);
        });
      });

      syncClient.connect(username);
    }

    // ── Local video mode ───────────────────────────────────────────────────────
    function initLocalMode(room) {
      const videoEl = document.getElementById('videoPlayer');
      videoEl.classList.remove('hidden');
      player = new VideoPlayer('videoPlayer', room.videoFilename);
      player.init();
    }

    // ── YouTube mode ───────────────────────────────────────────────────────────
    async function initYouTubeMode(room) {
      document.getElementById('youtubePlayer').classList.remove('hidden');
      document.getElementById('ytControls').classList.remove('hidden');

      player = new YouTubePlayer('youtubePlayer', room.videoId);
      await player.init();

      // Wire up custom controls UI
      // YouTube's native controls work but we add our own seek bar
      // so the sync overlay looks consistent with local video mode.
      wireYouTubeControls(player);
    }

    function wireYouTubeControls(ytPlayer) {
      const playPauseBtn  = document.getElementById('ytPlayPause');
      const seekBar       = document.getElementById('ytSeekBar');
      const currentTimeEl = document.getElementById('ytCurrentTime');
      const durationEl    = document.getElementById('ytDuration');

      let isSeeking = false; // True while user is dragging the seek bar

      // Update seek bar and time display every 500ms
      setInterval(() => {
        if (!ytPlayer.isReady || isSeeking) return;

        const current  = ytPlayer.getCurrentTime();
        const duration = ytPlayer.getDuration();

        currentTimeEl.textContent = formatTime(current);
        durationEl.textContent    = formatTime(duration);

        if (duration > 0) {
          seekBar.value = (current / duration) * 100;
        }

        playPauseBtn.textContent = ytPlayer.isPaused() ? '▶' : '⏸';
      }, 500);

      // Play/pause button
      playPauseBtn.addEventListener('click', () => {
        if (ytPlayer.isPaused()) {
          ytPlayer.onPlay && ytPlayer.onPlay(ytPlayer.getCurrentTime());
        } else {
          ytPlayer.onPause && ytPlayer.onPause(ytPlayer.getCurrentTime());
        }
      });

      // Seek bar — suppress poll updates while dragging
      seekBar.addEventListener('mousedown', () => { isSeeking = true; });
      seekBar.addEventListener('touchstart', () => { isSeeking = true; });

      seekBar.addEventListener('input', () => {
        const duration = ytPlayer.getDuration();
        const time     = (seekBar.value / 100) * duration;
        currentTimeEl.textContent = formatTime(time);
      });

      seekBar.addEventListener('change', () => {
        const duration = ytPlayer.getDuration();
        const time     = (seekBar.value / 100) * duration;
        isSeeking = false;
        // This triggers the onSeek callback which syncClient broadcasts
        if (ytPlayer.onSeek) ytPlayer.onSeek(time);
        ytPlayer.seekTo(time);
      });
    }

    // ── Helpers ────────────────────────────────────────────────────────────────
    function removeRemoteVideo(peerId) {
      document.querySelector(`[data-peer-id="${peerId}"]`)?.remove();
    }

    function appendChatMessage(msg) {
      const box = document.getElementById('chatMessages');
      const el  = document.createElement('div');
      if (msg.system) {
        el.className   = 'system-msg';
        el.textContent = msg.text;
      } else {
        el.className = 'chat-msg';
        el.innerHTML = `<span class="chat-author">${escapeHtml(msg.username)}</span>
                        <span class="chat-text">${escapeHtml(msg.text)}</span>`;
      }
      box.appendChild(el);
      const isAtBottom = box.scrollHeight - box.clientHeight - box.scrollTop < 60;
      if (isAtBottom) box.scrollTop = box.scrollHeight;
    }

    function appendSystemMsg(text) { appendChatMessage({ system: true, text }); }

    function setConnectionStatus(connected) {
      document.querySelector('.status-dot').className =
        `status-dot ${connected ? 'connected' : 'disconnected'}`;
      document.querySelector('.status-text').textContent =
        connected ? 'Connected' : 'Reconnecting...';
    }

    function showFatalError(detail) {
      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('errorDetail').textContent = detail;
      document.getElementById('errorScreen').classList.remove('hidden');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatTime(seconds) {
      if (!seconds || isNaN(seconds)) return '0:00';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      return `${m}:${String(s).padStart(2,'0')}`;
    }
  </script>
</body>
</html>
